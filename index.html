<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-area">
            <h1>Webhook Tester</h1>
            <button id="open-history-btn" class="history-toggle-btn">📜 履歴を開く</button>
        </div>
        
        <p class="description">指定したURLにJSONペイロードをPOST送信します。<br>入力内容はブラウザに保存され、右上のボタンから過去の履歴を復元できます。</p>

        <div class="notice">
            <strong>【簡易CORS対策適用中】</strong><br>
            ブラウザからの直接送信によるエラーを防ぐため、<code>Content-Type: application/json</code> ヘッダーを除外して送信します（Slack Webhook等で有効なケースがあります）。
        </div>

        <div class="form-group">
            <label for="webhook-url">Target URL (Webhook URL):</label>
            <input type="url" id="webhook-url" placeholder="https://hooks.slack.com/services/..." required>
        </div>

        <div class="form-group">
            <label for="payload-data">Payload (JSON):</label>
            <textarea id="payload-data" rows="8" placeholder='{&#10;  "text": "Hello, World!"&#10;}' required></textarea>
        </div>

        <div class="button-group">
            <button id="send-btn" class="send-btn">送信する</button>
            <div id="message-box"></div>
        </div>

        <div class="result-group">
            <label>Response / Result:</label>
            <pre id="result-area">結果がここに表示されます...</pre>
        </div>
    </div>

    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="history-drawer" class="drawer">
        <div class="drawer-header">
            <h2>送信履歴</h2>
            <div class="drawer-header-actions">
                <button id="clear-all-btn" class="clear-all-btn" title="すべての履歴を削除">🗑️ 全削除</button>
                <button id="close-history-btn" class="close-btn">&times;</button>
            </div>
        </div>
        <ul id="history-list" class="history-list">
            </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
